<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs Animation</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #1e293b 0%, #0f172a 35%, #020617 100%);
      color: white;
      min-height: 100vh;
    }

    .site {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .top-title {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .top-pill {
      min-width: 120px;
      text-align: center;
      padding: 14px 28px;
      border-radius: 18px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.35);
      opacity: 0;
      transform: translateY(-20px) scale(0.92);
      transition: all 0.45s ease;
      pointer-events: none;
    }

    .top-pill.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .hero {
      text-align: center;
      padding: 30px 0 10px;
    }

    .hero-sub {
      color: #94a3b8;
      font-size: 15px;
      margin-bottom: 30px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 35px;
      transition: all 0.4s ease;
    }

    .tab-btn {
      border: none;
      cursor: pointer;
      min-width: 140px;
      padding: 18px 28px;
      border-radius: 22px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 3px;
      color: white;
      background: rgba(30, 41, 59, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.22);
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, opacity 0.25s ease;
    }

    .tab-btn:hover {
      transform: translateY(-3px);
      background: rgba(51, 65, 85, 0.95);
      border-color: rgba(56, 189, 248, 0.45);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      border-color: transparent;
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.35);
    }

    .content-wrap {
      position: relative;
    }

    .tab-content {
      display: none;
      animation: fadeUp 0.45s ease;
    }

    .tab-content.active {
      display: block;
    }

    .card {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 24px;
    }

    .placeholder {
      min-height: 220px;
      border: 2px dashed rgba(148, 163, 184, 0.3);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      text-align: center;
      padding: 20px;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .top-pill {
        font-size: 28px;
        min-width: 100px;
      }

      .tab-btn {
        width: 100%;
        font-size: 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="site">
    <div class="top-title">
      <div id="topPill" class="top-pill">I</div>
    </div>

    <div class="hero">
      <div class="hero-sub">Нажми на вкладку</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-title="I" onclick="openTab('tab1', this)">I</button>
      <button class="tab-btn" data-title="II" onclick="openTab('tab2', this)">II</button>
      <button class="tab-btn" data-title="III" onclick="openTab('tab3', this)">III</button>
    </div>

    <div class="content-wrap">
      <div id="tab1" class="tab-content active">
        <div class="card">
          <h2 class="section-title">Раздел I</h2>
          <div class="placeholder">Поле для текста / изображения / схемы</div>
        </div>
      </div>

      <div id="tab2" class="tab-content">
        <div class="card">
          <h2 class="section-title">Раздел II</h2>
          <div class="grid">
            <div class="placeholder">Левое поле</div>
            <div class="placeholder">Правое поле</div>
          </div>
        </div>
      </div>

      <div id="tab3" class="tab-content">
        <div class="card">
          <h2 class="section-title">Раздел III</h2>
          <div class="placeholder">Большое поле для контента</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const topPill = document.getElementById('topPill');
    const buttons = document.querySelectorAll('.tab-btn');
    const tabs = document.querySelectorAll('.tab-content');

    function openTab(tabId, button) {
      tabs.forEach(tab => tab.classList.remove('active'));
      buttons.forEach(btn => btn.classList.remove('active'));

      document.getElementById(tabId).classList.add('active');
      button.classList.add('active');

      topPill.classList.remove('show');

      setTimeout(() => {
        topPill.textContent = button.dataset.title;
        topPill.classList.add('show');
      }, 180);
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        topPill.classList.add('show');
      }, 200);
    });
  </script>
</body>
</html>
